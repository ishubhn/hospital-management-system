server:
  port: 8921

spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      routes:
        - id : HOSPITAL-SERVICE
          uri: lb://HOSPITAL-SERVICE
          predicates:
            - Path=/hospital/**

        - id : PATIENT-SERVICE
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/users/**

        - id : PHARMACY-SERVICE
          uri: lb://PHARMACY-SERVICE
          predicates:
            - Path=/pharmacy/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka