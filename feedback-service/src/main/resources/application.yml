server:
    port: 8084

spring:
    datasource:
        url: jdbc:mysql://127.0.0.1:3306/ratings?zeroDateTimeBehavior=convertToNull
        username: root
        password: root
    devtools:
        add-properties: true
    application:
        name: Feedback-Service
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false

eureka:
    instance:
        prefer-ip-address: true
    client:
        fetch-registry: true
        register-with-eureka: true
        service-url:
            defaultZone: http://localhost:8761/eureka